<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Product Details Section -->
  <div class="product-page">
    <div class="product-details">
      <div class="product-image">
        <img src="images/1.webp" alt="Product Image">
      </div>
      <div class="product-info">
        <h1>Product Name</h1>
        <p class="product-price">$99.99</p>
        <p class="product-description">
          This is a detailed description of the product, highlighting its features, specifications, and benefits.
        </p>
        <button class="button-primary">Add to Cart</button>
      </div>
    </div>

    <!-- Related Products Section -->
    <div class="related-products">
      <h2>Related Products</h2>
      <div class="product-grid">
        <div class="product-card">
          <img src="images/1.webp" alt="Related Product 1">
          <p class="product-name">Related Product 1</p>
          <p class="product-price">$79.99</p>
        </div>
        <div class="product-card">
          <img src="images/2.webp" alt="Related Product 2">
          <p class="product-name">Related Product 2</p>
          <p class="product-price">$89.99</p>
        </div>
        <div class="product-card">
          <img src="images/6-piece-white-dinner-plate-set.jpg" alt="Related Product 3">
          <p class="product-name">Related Product 3</p>
          <p class="product-price">$59.99</p>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
